                    desc: 'Developed and maintained multiple client-facing web applications. Improved CI/CD pipeline reducing deployment time by 60%.' },
            ].forEach((exp, i) => {
                const html = `
              <div class="dynamic-entry exp-entry">
                <div class="entry-header"><span class="entry-number">Position #${i+1}</span><button class="btn-danger-sm" onclick="removeEntry(this)" title="Remove">✕</button></div>
                <div class="form-row">
                  <div class="form-group"><label>Company</label><input type="text" class="exp-company" value="${escapeHTML(exp.company)}"></div>
                  <div class="form-group"><label>Role</label><input type="text" class="exp-role" value="${escapeHTML(exp.role)}"></div>
                </div>
                <div class="form-row" style="margin-top:6px;">
                  <div class="form-group"><label>Start</label><input type="text" class="exp-start" value="${escapeHTML(exp.start)}"></div>
                  <div class="form-group"><label>End</label><input type="text" class="exp-end" value="${escapeHTML(exp.end)}"></div>
                </div>
                <div class="form-group" style="margin-top:6px;"><label>Description</label><textarea class="exp-desc">${escapeHTML(exp.desc)}</textarea></div>
              </div>`;
                expContainer.insertAdjacentHTML('beforeend', html);
            });
            updateEntryNumbers('experienceContainer', 'Position');

            // Education
            const eduContainer = document.getElementById('educationContainer');
            eduContainer.innerHTML = '';
            [
                { institution: 'UC Berkeley', degree: 'B.Sc. Computer Science', year: '2018' },
            ].forEach((edu, i) => {
                const html = `
              <div class="dynamic-entry edu-entry">
                <div class="entry-header"><span class="entry-number">Education #${i+1}</span><button class="btn-danger-sm" onclick="removeEntry(this)" title="Remove">✕</button></div>
                <div class="form-row">
                  <div class="form-group"><label>Institution</label><input type="text" class="edu-inst" value="${escapeHTML(edu.institution)}"></div>
                  <div class="form-group"><label>Degree</label><input type="text" class="edu-degree" value="${escapeHTML(edu.degree)}"></div>
                </div>
                <div class="form-group" style="margin-top:6px;max-width:140px;"><label>Year</label><input type="text" class="edu-year" value="${escapeHTML(edu.year)}"></div>
              </div>`;
                eduContainer.insertAdjacentHTML('beforeend', html);
            });
            updateEntryNumbers('educationContainer', 'Education');

            // Certifications
            const certContainer = document.getElementById('certificationsContainer');
            certContainer.innerHTML = '';
            [
                { name: 'AWS Solutions Architect', issuer: 'Amazon Web Services', year: '2023' },
                { name: 'Google UX Design Certificate', issuer: 'Google', year: '2022' },
            ].forEach((cert, i) => {
                const html = `
              <div class="dynamic-entry cert-entry">
                <div class="entry-header"><span class="entry-number">Cert #${i+1}</span><button class="btn-danger-sm" onclick="removeEntry(this)" title="Remove">✕</button></div>
                <div class="form-row">
                  <div class="form-group"><label>Name</label><input type="text" class="cert-name" value="${escapeHTML(cert.name)}"></div>
                  <div class="form-group"><label>Issuer</label><input type="text" class="cert-issuer" value="${escapeHTML(cert.issuer)}"></div>
                </div>
                <div class="form-group" style="margin-top:6px;max-width:140px;"><label>Year</label><input type="text" class="cert-year" value="${escapeHTML(cert.year)}"></div>
              </div>`;
                certContainer.insertAdjacentHTML('beforeend', html);
            });
            updateEntryNumbers('certificationsContainer', 'Cert');

            // Hobbies
            document.getElementById('hobbies').value =
                'Photography, Hiking, Open Source, Chess, Playing Guitar, Machine Learning';

            // Contact
            document.getElementById('email').value = 'alex@example.com';
            document.getElementById('phone').value = '+1 (415) 555-0198';
            document.getElementById('location').value = 'San Francisco, CA';
            document.getElementById('github').value = 'https://github.com/alexchen';
            document.getElementById('linkedin').value = 'https://linkedin.com/in/alexchen';
            document.getElementById('twitter').value = 'https://twitter.com/alexchen';
            document.getElementById('website').value = 'https://alexchen.dev';

            // Ensure all section toggles are on
            document.getElementById('includeSkills').checked = true;
            document.getElementById('includeProjects').checked = true;
            document.getElementById('includeExperience').checked = true;
            document.getElementById('includeEducation').checked = true;
            document.getElementById('includeCertifications').checked = true;
            document.getElementById('includeHobbies').checked = true;
            document.getElementById('includeContact').checked = true;

            generateAndPreview();
            showToast('📋 Sample data loaded! Preview updated.');
        }

        function clearAllFields() {
            document.querySelectorAll('input[type="text"], input[type="url"], input[type="email"], textarea').forEach(
            el => el.value = '');
            document.querySelectorAll('select.skill-level').forEach(el => el.value = '50');
            document.getElementById('name').value = '';
            document.getElementById('title').value = '';
            document.querySelectorAll('.dynamic-entry').forEach(entry => {
                entry.querySelectorAll('input, textarea').forEach(el => el.value = '');
            });
            // Reset to defaults
            document.getElementById('includeSkills').checked = true;
            document.getElementById('includeProjects').checked = true;
            document.getElementById('includeExperience').checked = true;
            document.getElementById('includeEducation').checked = true;
            document.getElementById('includeCertifications').checked = true;
            document.getElementById('includeHobbies').checked = true;
            document.getElementById('includeContact').checked = true;
            // Reset color
            document.querySelectorAll('#colorSwatches .color-swatch').forEach(s => s.classList.remove('active'));
            const blueSwatch = document.querySelector('#colorSwatches .c-blue');
            if (blueSwatch) blueSwatch.classList.add('active');
            selectedAccentColor = '#4a90d9';
            // Reset theme
            document.querySelectorAll('.theme-option').forEach(o => o.classList.remove('active'));
            const lightOpt = document.querySelector('.theme-option[data-theme="light"]');
            if (lightOpt) lightOpt.classList.add('active');
            selectedTheme = 'light';
            // Reset preview
            const iframe = document.getElementById('previewIframe');
            iframe.srcdoc =
                "<html><body style='display:flex;align-items:center;justify-content:center;height:100%;font-family:sans-serif;color:#999;background:#fafafa;'><p>📝 Fill out the form and click <strong>Generate Preview</strong> to see your portfolio here.</p></body></html>";
            iframe._portfolioHTML = null;
            showToast('🗑 All fields cleared.');
        }

        // ============ INITIAL SETUP ============
        function init() {
            updateEntryNumbers('skillsContainer', 'Skill');
            updateEntryNumbers('projectsContainer', 'Project');
            updateEntryNumbers('experienceContainer', 'Position');
            updateEntryNumbers('educationContainer', 'Education');
            updateEntryNumbers('certificationsContainer', 'Cert');
            // Auto-generate on any input change (debounced)
            let debounceTimer;
            const formPanel = document.getElementById('formPanel');
            formPanel.addEventListener('input', () => {
                clearTimeout(debounceTimer);
                debounceTimer = setTimeout(() => {
                    // Only auto-update if preview is visible
                    if (!document.getElementById('previewPanel').classList.contains(
                            'hidden-on-mobile') || window.innerWidth > 900) {
                        generateAndPreviewSilent();
                    }
                }, 600);
            });
        }

        function generateAndPreviewSilent() {
            const data = gatherFormData();
            const portfolioHTML = generatePortfolioHTML(data);
            const iframe = document.getElementById('previewIframe');
            iframe.srcdoc = portfolioHTML;
            iframe._portfolioHTML = portfolioHTML;
        }

        init();
        // Generate initial preview with default empty-ish data
        setTimeout(generateAndPreviewSilent, 300);
    </script>
</body>
</html>
